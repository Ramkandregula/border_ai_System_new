version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: border_ai_db
    environment:
      POSTGRES_USER: ${DB_USER:-border_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-border_password}
      POSTGRES_DB: ${DB_NAME:-border_ai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - border_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-border_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: border_ai_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - border_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: border_ai_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${DB_USER:-border_user}:${DB_PASSWORD:-border_password}@db:5432/${DB_NAME:-border_ai_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_DEBUG: ${API_DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml_models:/app/models
      - ./uploads:/app/uploads
      - ./logs:/var/log/border_ai
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - border_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: border_ai_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - border_network
    stdin_open: true
    tty: true

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: border_ai_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - border_network
    depends_on:
      - backend

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: border_ai_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - border_network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  border_network:
    driver: bridge